# File structure planning
src:
  core:
    types.ts: typing used throughout the project.
    store: self-made light weight publisher/subscriber store.
  ui:
    shell.ts: root node containing all the component ui.
    theme.ts: theme file containing all the theme specific css changes.
    loading.ts: loading spinner across all cards.
    styles.css: fixed/core css changes used app wide.
  features:
    model:
      modelWorker.ts: Model worker to combine both summary and recommendation model call.
    runtime:
      runtime.ts: runtime class with mount ui
      probeRuntime.ts: runtime logic
    preview:
      preview.ts: preview class component
    summary:
      summary.ts: mount summary
      summarizer.ts: summarizer logic
      summary.worker.ts: worker for background work
    recommendation:
      recommendation.ts: mount recommendation
      keywords.ts: extract keyword logic
  platform:
    content.ts: extract page text
    background.ts: chrome background listener for chrome events
  shared:
    utils.ts: shared utility functions
  vite-env.d.ts: just a file to make vite recognise css as imports.
  index.ts: assembler/orchestrator